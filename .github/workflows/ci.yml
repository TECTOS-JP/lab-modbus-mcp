name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      # lab-executor-mcp is resolved from PyPI through project dependencies.
      - name: Install package and development dependencies
        run: python -m pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src tests
      - name: Ruff format
        run: ruff format --check src tests
      - name: BEF conformance kit
        run: pytest -q tests/test_backends.py tests/test_mb3_assets.py
      - name: Full test suite
        run: pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
