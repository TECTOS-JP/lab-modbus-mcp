name: Publish to PyPI

# Tag pushes publish to PyPI. Manual runs default to TestPyPI.
# Authentication uses Trusted Publishing (OIDC), never a long-lived API token.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: testpypi
        type: choice
        options: [testpypi, pypi]

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install --upgrade build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Verify metadata renders on PyPI
        run: python -m twine check dist/*
      - name: Guard sdist contents
        run: |
          python - <<'PY'
          import glob, sys, tarfile

          sdist = glob.glob("dist/*.tar.gz")[0]
          with tarfile.open(sdist) as archive:
              names = [member.name for member in archive.getmembers() if member.isfile()]
          leaked = [
              name for name in names
              if any(forbidden in name for forbidden in (
                  ".uv-cache", ".venv", "site-packages",
                  ".mypy_cache", ".ruff_cache",
              ))
          ]
          if leaked:
              print(f"sdist contains {len(leaked)} forbidden files:")
              for name in leaked[:20]:
                  print("  ", name)
              sys.exit(1)
          if len(names) > 2000:
              print(f"sdist file count is unexpectedly high: {len(names)}")
              sys.exit(1)
          print(f"sdist OK: {len(names)} files")
          PY
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
